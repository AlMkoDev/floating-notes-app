<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Floating Notes</title>

  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.snow.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* ================= UPDATE UI ================= */

    #update-banner {
      display: none;
      background: #111;
      border-bottom: 1px solid #333;
      padding: 8px 10px;
      font-size: 12px;
      align-items: center;
      justify-content: space-between;
      flex-direction: column;
    }

    #update-top {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
    }

    #restart-btn {
      display: none;
      background: #007acc;
      color: white;
      border: none;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
    }

    #update-progress {
      height: 4px;
      background: #333;
      width: 100%;
      margin-top: 6px;
      border-radius: 3px;
      overflow: hidden;
    }

    #update-progress-bar {
      height: 100%;
      width: 0%;
      background: #00aaff;
      transition: width 0.2s;
    }

    #changelog {
      display: none;
      width: 100%;
      margin-top: 6px;
      font-size: 11px;
      color: #ccc;
      max-height: 120px;
      overflow-y: auto;
      background: #0f0f0f;
      padding: 6px;
      border-radius: 4px;
      white-space: pre-wrap;
    }

    #version-badge {
      position: absolute;
      top: 5px;
      right: 10px;
      font-size: 10px;
      color: #888;
      background: #111;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid #333;
    }

    /* ================= APP ================= */

    #drag-bar {
      height: 30px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      -webkit-app-region: drag;
    }

    #note-controls {
      display: flex;
      gap: 5px;
    }

    button, select {
      -webkit-app-region: no-drag;
    }

    #toolbar {
      background: #2d2d2d;
      border-bottom: 1px solid #444;
    }

    #editor {
      height: 520px;
      background: #1e1e1e;
    }

    .note-list {
      background: #181818;
      padding: 5px;
      display: flex;
      gap: 5px;
      overflow-x: auto;
    }

    .note-tab {
      background: #333;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
    }

    .note-tab.active {
      background: #007acc;
    }
  </style>
</head>

<body>

  <!-- ================= LICENSE GATE ================= -->
<div id="license-gate" style="
  display:none;
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  z-index:9999;
  padding:20px;
  box-sizing:border-box;
">

  <h3>Activate Floating Notes</h3>

  <input id="license-input" placeholder="Enter license key"
    style="width:100%;padding:8px;margin-top:10px;background:#222;border:1px solid #444;color:white;" />

  <button onclick="submitLicense()"
    style="margin-top:10px;padding:8px 12px;background:#007acc;color:white;border:none;">
    Activate
  </button>

  <p id="license-msg" style="font-size:12px;color:#aaa;margin-top:10px;"></p>
  </div>

  <!-- VERSION BADGE -->
  <div id="version-badge">v1.0.2</div>

  <!-- UPDATE UI -->
  <div id="update-banner">
    <div id="update-top">
      <div id="update-text">Checking for updates...</div>
      <button id="restart-btn" onclick="restartApp()">Restart</button>
    </div>

    <div id="update-progress">
      <div id="update-progress-bar"></div>
    </div>

    <div id="changelog"></div>
  </div>

  <!-- APP -->
  <div id="drag-bar">
    <span>Floating Notes</span>
    <div id="note-controls">
      <button onclick="createNote()">+</button>
      <button onclick="exportWord()">DOCX</button>
      <button onclick="exportPDF()">PDF</button>
    </div>
  </div>

  <div class="note-list" id="noteList"></div>

  <div id="toolbar">
    <span class="ql-formats">
      <button class="ql-bold"></button>
      <button class="ql-italic"></button>
      <button class="ql-underline"></button>
      <button class="ql-strike"></button>
    </span>

    <span class="ql-formats">
      <select class="ql-color"></select>
      <select class="ql-background"></select>
    </span>

    <span class="ql-formats">
      <button class="ql-list" value="ordered"></button>
      <button class="ql-list" value="bullet"></button>
    </span>

    <span class="ql-formats">
      <button class="ql-clean"></button>
    </span>
  </div>

  <div id="editor"></div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0/dist/quill.js"></script>

  <script>
    const STORAGE_KEY = "floating_notes_multi";
    let notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    let currentNoteId = null;

    const quill = new Quill('#editor', {
      theme: 'snow',
      modules: { toolbar: '#toolbar' }
    });

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function renderNotes() {
      const list = document.getElementById("noteList");
      list.innerHTML = "";

      notes.forEach(note => {
        const tab = document.createElement("div");
        tab.className = "note-tab " + (note.id === currentNoteId ? "active" : "");
        tab.innerText = note.title || "Note";
        tab.onclick = () => switchNote(note.id);
        list.appendChild(tab);
      });
    }

    function createNote() {
      const id = Date.now();
      const newNote = { id, title: "Note " + (notes.length + 1), content: "" };
      notes.push(newNote);
      currentNoteId = id;
      saveNotes();
      renderNotes();
      loadCurrentNote();
    }

    function switchNote(id) {
      currentNoteId = id;
      loadCurrentNote();
      renderNotes();
    }

    function loadCurrentNote() {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) quill.root.innerHTML = note.content;
    }

    quill.on('text-change', () => {
      const note = notes.find(n => n.id === currentNoteId);
      if (note) {
        note.content = quill.root.innerHTML;
        saveNotes();
      }
    });

    if (notes.length === 0) {
      createNote();
    } else {
      currentNoteId = notes[0].id;
      renderNotes();
      loadCurrentNote();
    }

    const { ipcRenderer } = require('electron');

    function exportWord() {
      ipcRenderer.send('export-word', quill.root.innerHTML);
    }

    function exportPDF() {
      ipcRenderer.send('export-pdf', quill.getText());
    }

    /* ================= UPDATE SYSTEM ================= */

    ipcRenderer.on('update-status', (event, data) => {
      const banner = document.getElementById('update-banner');
      const text = document.getElementById('update-text');
      const btn = document.getElementById('restart-btn');
      const changelog = document.getElementById('changelog');

      banner.style.display = 'flex';

      if (data.status === 'checking') {
        text.innerText = 'Checking for updates...';
      }

      if (data.status === 'available') {
        text.innerText = `Update available: v${data.version}`;
      }

      if (data.status === 'none') {
        banner.style.display = 'none';
      }

      if (data.status === 'downloaded') {
        text.innerText = 'Update ready to install';
        btn.style.display = 'inline-block';
      }

      if (data.status === 'error') {
        text.innerText = 'Update error: ' + data.message;
      }
    });

    ipcRenderer.on('update-download', (event, data) => {
      document.getElementById('update-progress-bar').style.width = data.percent + '%';
    });

    ipcRenderer.on('update-meta', (event, data) => {
      const changelog = document.getElementById('changelog');

      if (data.releaseNotes) {
        changelog.style.display = 'block';
        changelog.innerText = data.releaseNotes;
      }

      if (data.version) {
        document.getElementById('version-badge').innerText = "v" + data.version;
      }
    });

    function restartApp() {
      ipcRenderer.send('restart-app');
    }

    /* ================= LICENSE GATE ================= */
    function showLicenseGate(show) {
  document.getElementById('license-gate').style.display = show ? 'block' : 'none';
}

function submitLicense() {
  const key = document.getElementById('license-input').value;
  ipcRenderer.send('validate-license', key);
}

ipcRenderer.on('license-result', (event, data) => {
  const msg = document.getElementById('license-msg');

  if (data.valid) {
    msg.innerText = "Activated successfully";
    showLicenseGate(false);
  } else {
    msg.innerText = "Invalid license key";
  }
});

ipcRenderer.on('license-status', (event, data) => {
  if (!data.valid) {
    showLicenseGate(true);
  } else {
    showLicenseGate(false);
  }
});

// ask main process for status
ipcRenderer.send('check-license');
  </script>

</body>
</html>
